# =============================================================================
# Constraint: Block Host Network
# =============================================================================
#
# SYNC WAVE: 2
#
# Cấm hostNetwork: true
#
# =============================================================================

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPHostNetworkingPorts
metadata:
  name: block-host-network
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaces:
      - "demo"
  parameters:
    hostNetwork: false  # Không cho phép hostNetwork
    min: 0
    max: 0              # Không cho phép hostPort
