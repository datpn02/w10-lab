# ConstraintTemplate: Max Replicas
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8smaxreplicas
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    metadata.gatekeeper.sh/title: "Max Replicas"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Rejects Deployments whose replicas exceed the configured maximum.
spec:
  crd:
    spec:
      names:
        kind: K8sMaxReplicas
      validation:
        openAPIV3Schema:
          type: object
          properties:
            maxReplicas:
              description: Maximum allowed replica count.
              type: integer
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8smaxreplicas

        violation[{"msg": msg}] {
          replicas := object.get(input.review.object.spec, "replicas", 1)
          max := input.parameters.maxReplicas
          replicas > max
          msg := sprintf("F-05: Deployment <%v> has replicas <%v>, which exceeds maxReplicas <%v>", [input.review.object.metadata.name, replicas, max])
        }
