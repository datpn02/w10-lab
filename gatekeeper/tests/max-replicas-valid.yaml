apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-max-replicas-valid
  namespace: demo
spec:
  replicas: 5
  selector:
    matchLabels:
      app: test-max-replicas-valid
  template:
    metadata:
      labels:
        app: test-max-replicas-valid
    spec:
      containers:
        - name: nginx
          image: nginx:1.21
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsUser: 1000
